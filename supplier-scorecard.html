<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#2563EB;--accent-light:#DBEAFE;--accent-dark:#1D4ED8;--slate-50:#F8FAFC;--slate-100:#F1F5F9;--slate-200:#E2E8F0;--slate-400:#94A3B8;--slate-500:#64748B;--slate-600:#475569;--slate-700:#334155;--slate-800:#1E293B;--slate-900:#0F172A;--success:#0F766E;--success-light:#CCFBF1;--warning:#B45309;--warning-light:#FEF3C7;--danger:#DC2626;--danger-light:#FEE2E2;--radius:8px;--radius-lg:12px;--shadow-sm:0 1px 2px rgba(0,0,0,.05);font-family:'Pretendard','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif}
  body{background:var(--slate-50);color:var(--slate-800);font-size:14px;line-height:1.6}
  header{background:#fff;border-bottom:1px solid var(--slate-200)}
  .header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .logo-mark{font-size:20px;font-weight:800;color:var(--slate-900);text-decoration:none}
  .logo-mark span{color:var(--accent)}
  .nav-link{font-size:13px;font-weight:600;color:var(--slate-500);text-decoration:none;padding:7px 12px;border-radius:6px}
  .nav-link:hover{background:var(--slate-100)}
  .hero{background:#fff;border-bottom:1px solid var(--slate-200);padding:28px 24px 24px}
  .hero-inner{max-width:1200px;margin:0 auto}
  .hero h1{font-size:22px;font-weight:700;color:var(--slate-900);margin-bottom:6px}
  .hero p{font-size:14px;color:var(--slate-500);max-width:680px}
  .main{max-width:1200px;margin:0 auto;padding:28px 24px 60px}
  .card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);margin-bottom:20px}
  .card-header{padding:16px 20px;border-bottom:1px solid var(--slate-100);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .card-title{font-size:14px;font-weight:600;color:var(--slate-800)}
  .card-body{padding:0}
  .sc-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .sc-table th,.sc-table td{border-bottom:1px solid var(--slate-100);padding:10px 12px;text-align:center}
  .sc-table th{background:var(--slate-50);font-size:10.5px;color:var(--slate-500);text-transform:uppercase;font-weight:700}
  .sc-table td.crit{text-align:left;font-weight:600;color:var(--slate-700)}
  .sc-table input.weight{width:56px;text-align:center;border:1px solid var(--slate-200);border-radius:5px;padding:5px}
  .sc-table input.score{width:44px;text-align:center;border:1px solid var(--slate-200);border-radius:5px;padding:5px}
  .sc-table input.vendor-name{width:100%;border:none;background:transparent;font-weight:700;text-align:center;font-size:12.5px;border-bottom:2px solid var(--slate-200);padding-bottom:4px}
  .weighted-cell{font-weight:700}
  .weighted-cell.green{color:var(--success)}
  .weighted-cell.yellow{color:var(--warning)}
  .weighted-cell.red{color:var(--danger)}
  .total-row td{background:var(--accent-light);font-weight:800;color:var(--accent-dark);font-size:14px}
  .btn-add-vendor{padding:8px 16px;border:1px dashed var(--slate-300);background:transparent;border-radius:6px;font-size:12px;color:var(--slate-500);cursor:pointer;font-family:inherit}
  .btn-add-vendor:hover{border-color:var(--accent);color:var(--accent)}
  .btn-print{padding:8px 16px;background:var(--slate-900);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-print:hover{background:var(--accent)}
  .weight-warning{font-size:11.5px;color:var(--warning);padding:10px 20px;}
  .notice-box{background:var(--accent-light);border:1px solid #BFDBFE;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:#1E40AF;margin:14px 20px}
  @media print{ header,.hero,.btn-print,.btn-add-vendor,footer{display:none !important} }
  footer{background:var(--slate-900);color:var(--slate-400);padding:24px;font-size:12px}
  .footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .footer-logo{font-size:15px;font-weight:800;color:#fff}
  .footer-logo span{color:var(--accent)}
  .footer-link{color:var(--slate-500);text-decoration:none;font-size:11px;margin-right:14px}
  @media (max-width:768px){.sc-table{font-size:11px}.sc-table th,.sc-table td{padding:6px}}

<body>
<header><div class="header-inner">
  <a href="index.html" class="logo-mark">CBM<span>Lab</span></a>
  <a href="index.html" class="nav-link">← 전체 도구 보기</a>
</div></header>

<section class="hero"><div class="hero-inner">
  <h1>공급업체 평가 스코어카드 생성기</h1>
  <p>가중치를 설정하고 항목별 점수(1~5점)를 입력하면 가중 평균 점수가 자동으로 계산됩니다. 여러 공급업체를 나란히 비교해보세요.</p>
</div></section>

<div class="main">
  <div class="card">
    <div class="card-header">
      <div class="card-title">평가표</div>
      <div style="display:flex;gap:8px;">
        <button class="btn-add-vendor" onclick="addVendor()">+ 공급업체 추가</button>
        <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
      </div>
    </div>
    <div class="card-body">
      <div style="overflow-x:auto;">
        <table class="sc-table" id="scTable"></table>
      </div>
      <div class="weight-warning" id="weightWarning"></div>
      <div class="notice-box">가중치 합계는 100%가 되어야 정확한 백분율 점수가 나옵니다. 점수는 1~5점(5점이 최고)으로 입력하세요. 80점 이상 초록, 60~79점 노랑, 60점 미만 빨강으로 자동 표시됩니다.</div>
    </div>
  </div>
</div>

<footer><div class="footer-inner">
  <div class="footer-logo">CBM<span>Lab</span></div>
  <nav><a href="index.html" class="footer-link">전체 도구</a><a href="privacy.html" class="footer-link">개인정보 처리방침</a></nav>
</div></footer>

<script>
let criteria = [
  {name:'가격 경쟁력', weight:20},
  {name:'품질 (불량률)', weight:20},
  {name:'납기 준수율', weight:20},
  {name:'MOQ 유연성', weight:10},
  {name:'커뮤니케이션 응답속도', weight:10},
  {name:'재무 안정성', weight:10},
  {name:'품질 인증 (ISO 등)', weight:10}
];
let vendors = ['공급업체 A', '공급업체 B'];
let scores = {}; // scores[critIdx][vendorIdx] = score

function initScores(){
  criteria.forEach((c,ci)=>{
    if(!scores[ci]) scores[ci] = [];
    vendors.forEach((v,vi)=>{
      if(scores[ci][vi]===undefined) scores[ci][vi] = 3;
    });
  });
}

function addVendor(){
  vendors.push('공급업체 ' + String.fromCharCode(65+vendors.length));
  initScores();
  render();
}

function updateWeight(idx, val){ criteria[idx].weight = parseFloat(val)||0; render(); }
function updateScore(ci, vi, val){ scores[ci][vi] = parseFloat(val)||0; render(); }
function updateVendorName(vi, val){ vendors[vi] = val; }

function render(){
  initScores();
  const totalWeight = criteria.reduce((a,c)=>a+c.weight,0);
  const warn = document.getElementById('weightWarning');
  warn.textContent = totalWeight !== 100 ? `⚠️ 가중치 합계가 ${totalWeight}%입니다 (100%가 되도록 조정하세요)` : '';

  let html = '<thead><tr><th style="text-align:left;">평가 항목</th><th>가중치</th>';
  vendors.forEach((v,vi)=> html += `<th><input class="vendor-name" value="${v}" oninput="updateVendorName(${vi},this.value)"></th>`);
  html += '</tr></thead><tbody>';

  const vendorTotals = vendors.map(()=>0);

  criteria.forEach((c,ci)=>{
    html += `<tr><td class="crit">${c.name}</td><td><input class="weight" type="number" value="${c.weight}" oninput="updateWeight(${ci},this.value)">%</td>`;
    vendors.forEach((v,vi)=>{
      const score = scores[ci][vi];
      const weighted = (score/5) * c.weight;
      vendorTotals[vi] += weighted;
      html += `<td><input class="score" type="number" min="0" max="5" value="${score}" oninput="updateScore(${ci},${vi},this.value)"></td>`;
    });
    html += '</tr>';
  });

  html += `<tr class="total-row"><td colspan="2" style="text-align:left;">종합 점수 (100점 만점)</td>`;
  vendorTotals.forEach(t=>{
    const cls = t>=80?'green':(t>=60?'yellow':'red');
    html += `<td class="weighted-cell ${cls}">${t.toFixed(1)}</td>`;
  });
  html += '</tr></tbody>';

  document.getElementById('scTable').innerHTML = html;
}
render();
</script>
</body>
</html>
